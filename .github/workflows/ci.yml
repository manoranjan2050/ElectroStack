name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: cargo check
        working-directory: apps/desktop/src-tauri
